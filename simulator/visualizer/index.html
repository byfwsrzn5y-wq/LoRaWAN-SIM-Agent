<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoRaWAN World Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    
    .container {
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    
    header {
      grid-column: 1 / -1;
      background: #1e293b;
      padding: 16px 24px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #f8fafc;
    }
    
    .status {
      display: flex;
      gap: 16px;
      font-size: 13px;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    
    .status-dot.warning { background: #eab308; }
    .status-dot.error { background: #ef4444; }
    .status-dot.offline { background: #64748b; }
    
    aside {
      background: #1e293b;
      border-right: 1px solid #334155;
      padding: 16px;
      overflow-y: auto;
    }
    
    .panel {
      background: #0f172a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .panel h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    
    .gateway-list, .node-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .gateway-item, .node-item {
      background: #1e293b;
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .gateway-item:hover, .node-item:hover {
      background: #334155;
    }
    
    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    
    .item-name {
      font-size: 13px;
      font-weight: 500;
      color: #f8fafc;
    }
    
    .item-eui {
      font-size: 11px;
      color: #64748b;
      font-family: monospace;
    }
    
    .item-stats {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: #94a3b8;
    }
    
    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .stat-value {
      color: #f8fafc;
      font-weight: 500;
    }
    
    .stat-value.good { color: #22c55e; }
    .stat-value.warning { color: #eab308; }
    .stat-value.error { color: #ef4444; }
    
    .anomaly-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #ef4444;
      color: white;
      font-weight: 500;
    }
    
    .anomaly-badge.normal {
      background: #22c55e;
    }
    
    main {
      position: relative;
      overflow: hidden;
    }
    
    #map-canvas {
      width: 100%;
      height: 100%;
      background: #0f172a;
    }
    
    .map-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .map-btn {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .map-btn:hover {
      background: #334155;
      border-color: #475569;
    }
    
    .map-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
    }
    
    .legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      font-size: 11px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    
    .legend-item:last-child {
      margin-bottom: 0;
    }
    
    .legend-icon {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .legend-icon.gateway { background: #3b82f6; }
    .legend-icon.node { background: #22c55e; }
    .legend-icon.node-anomaly { background: #ef4444; }
    
    .connection-status {
      position: absolute;
      top: 16px;
      left: 16px;
      background: #1e293b;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>LoRaWAN World Simulator</h1>
      <div class="status">
        <div class="status-item">
          <span class="status-dot" id="chirpstack-status"></span>
          <span id="chirpstack-text">ChirpStack: --</span>
        </div>
        <div class="status-item">
          <span>Nodes: <strong id="node-count">0</strong></span>
        </div>
        <div class="status-item">
          <span>Gateways: <strong id="gateway-count">0</strong></span>
        </div>
        <div class="status-item">
          <span>Uplinks: <strong id="uplink-count">0</strong></span>
        </div>
      </div>
    </header>
    
    <aside>
      <div class="panel">
        <h3>Gateways</h3>
        <div class="gateway-list" id="gateway-list">
          <div style="color: #64748b; font-size: 12px;">Loading...</div>
        </div>
      </div>
      
      <div class="panel">
        <h3>Nodes</h3>
        <div class="node-list" id="node-list">
          <div style="color: #64748b; font-size: 12px;">Loading...</div>
        </div>
      </div>
      
      <div class="panel">
        <h3>Signal Model</h3>
        <div class="item-stats" style="flex-direction: column; gap: 8px;">
          <div class="stat">
            <span>Environment:</span>
            <span class="stat-value" id="env-value">--</span>
          </div>
          <div class="stat">
            <span>Tx Power:</span>
            <span class="stat-value" id="txpower-value">-- dBm</span>
          </div>
          <div class="stat">
            <span>Frequency:</span>
            <span class="stat-value" id="freq-value">-- MHz</span>
          </div>
        </div>
      </div>
      
      <div class="panel">
        <h3>Statistics</h3>
        <div class="item-stats" style="flex-direction: column; gap: 8px;">
          <div class="stat">
            <span>Joins:</span>
            <span class="stat-value" id="join-count">0</span>
          </div>
          <div class="stat">
            <span>Errors:</span>
            <span class="stat-value" id="error-count">0</span>
          </div>
          <div class="stat">
            <span>Last Update:</span>
            <span class="stat-value" id="last-update">--</span>
          </div>
        </div>
      </div>
    </aside>
    
    <main>
      <canvas id="map-canvas"></canvas>
      
      <div class="connection-status">
        <span class="status-dot" id="sim-status"></span>
        <span id="sim-status-text">Simulator: Offline</span>
      </div>
      
      <div class="map-controls">
        <button class="map-btn active" id="btn-top" onclick="setView('top')">Top View</button>
        <button class="map-btn" id="btn-side" onclick="setView('side')">Side View</button>
        <button class="map-btn active" id="btn-coverage" onclick="toggleCoverage()">Coverage</button>
        <button class="map-btn active" id="btn-animation" onclick="toggleAnimation()">Animation</button>
        <button class="map-btn" onclick="refreshData()">Refresh</button>
      </div>
      
      <div class="legend">
        <div class="legend-item">
          <div class="legend-icon gateway"></div>
          <span>Gateway</span>
        </div>
        <div class="legend-item">
          <div class="legend-icon node"></div>
          <span>Normal Node</span>
        </div>
        <div class="legend-item">
          <div class="legend-icon node-anomaly"></div>
          <span>Anomaly Node</span>
        </div>
      </div>
    </main>
  </div>
  
  <script>
    // 配置
    const API_BASE = window.location.origin;
    const POLL_INTERVAL = 1000; // 1秒轮询
    
    // 状态
    const simulation = {
      running: false,
      gateways: [],
      nodes: [],
      config: { signalModel: {} },
      stats: { uplinks: 0, joins: 0, errors: 0 },
      lastUpdate: null
    };
    
    // Canvas
    const canvas = document.getElementById('map-canvas');
    const ctx = canvas.getContext('2d');
    let viewMode = 'top';
    let showCoverage = true;
    let animationEnabled = true;
    let animationFrame = 0;
    
    // 初始化
    function init() {
      resize();
      window.addEventListener('resize', resize);
      startPolling();
      render();
    }
    
    function resize() {
      canvas.width = canvas.offsetWidth * window.devicePixelRatio;
      canvas.height = canvas.offsetHeight * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    
    // 轮询 API
    async function fetchState() {
      try {
        const res = await fetch(`${API_BASE}/api/state`);
        const data = await res.json();
        
        simulation.running = data.running || false;
        simulation.gateways = data.gateways || [];
        simulation.nodes = data.nodes || [];
        simulation.config = data.config || {};
        simulation.stats = data.stats || { uplinks: 0, joins: 0, errors: 0 };
        simulation.lastUpdate = data.lastUpdate;
        
        updateUI();
        updateConnectionStatus(true);
      } catch (e) {
        console.error('Failed to fetch state:', e);
        updateConnectionStatus(false);
      }
    }
    
    function startPolling() {
      fetchState();
      setInterval(fetchState, POLL_INTERVAL);
    }
    
    function refreshData() {
      fetchState();
    }
    
    // UI 更新
    function updateConnectionStatus(connected) {
      const dot = document.getElementById('sim-status');
      const text = document.getElementById('sim-status-text');
      
      if (connected && simulation.running) {
        dot.className = 'status-dot';
        text.textContent = 'Simulator: Running';
      } else if (connected) {
        dot.className = 'status-dot warning';
        text.textContent = 'Simulator: Idle';
      } else {
        dot.className = 'status-dot offline';
        text.textContent = 'Simulator: Offline';
      }
    }
    
    function updateUI() {
      // 计数
      document.getElementById('node-count').textContent = simulation.nodes.length;
      document.getElementById('gateway-count').textContent = simulation.gateways.length;
      document.getElementById('uplink-count').textContent = simulation.stats.uplinks || 0;
      document.getElementById('join-count').textContent = simulation.stats.joins || 0;
      document.getElementById('error-count').textContent = simulation.stats.errors || 0;
      
      // 时间
      if (simulation.lastUpdate) {
        const date = new Date(simulation.lastUpdate);
        document.getElementById('last-update').textContent = date.toLocaleTimeString();
      }
      
      // 信号模型
      const sm = simulation.config?.signalModel || {};
      document.getElementById('env-value').textContent = sm.environment || '--';
      document.getElementById('txpower-value').textContent = sm.txPower ? `${sm.txPower} dBm` : '--';
      document.getElementById('freq-value').textContent = sm.frequency ? `${(sm.frequency / 1e6).toFixed(1)} MHz` : '--';
      
      // ChirpStack 状态
      const chirpstackDot = document.getElementById('chirpstack-status');
      const chirpstackText = document.getElementById('chirpstack-text');
      if (simulation.running) {
        chirpstackDot.className = 'status-dot';
        chirpstackText.textContent = 'ChirpStack: Connected';
      } else {
        chirpstackDot.className = 'status-dot offline';
        chirpstackText.textContent = 'ChirpStack: --';
      }
      
      // Gateway 列表
      const gwList = document.getElementById('gateway-list');
      if (simulation.gateways.length === 0) {
        gwList.innerHTML = '<div style="color: #64748b; font-size: 12px;">No gateways</div>';
      } else {
        gwList.innerHTML = simulation.gateways.map(gw => `
          <div class="gateway-item">
            <div class="item-header">
              <span class="item-name">${gw.name || gw.eui}</span>
            </div>
            <div class="item-eui">${gw.eui}</div>
            <div class="item-stats">
              <div class="stat">Pos: <span class="stat-value">${gw.position?.x || 0}, ${gw.position?.y || 0}</span></div>
              <div class="stat">H: <span class="stat-value">${gw.position?.z || 0}m</span></div>
            </div>
          </div>
        `).join('');
      }
      
      // Node 列表 (显示前20个)
      const nodeList = document.getElementById('node-list');
      if (simulation.nodes.length === 0) {
        nodeList.innerHTML = '<div style="color: #64748b; font-size: 12px;">No nodes</div>';
      } else {
        const displayNodes = simulation.nodes.slice(0, 20);
        nodeList.innerHTML = displayNodes.map(node => `
          <div class="node-item">
            <div class="item-header">
              <span class="item-name">${node.name || node.eui?.slice(-4)}</span>
              ${node.anomaly?.enabled ? `<span class="anomaly-badge">${node.anomaly.scenario?.split('-')[0] || 'anomaly'}</span>` : '<span class="anomaly-badge normal">normal</span>'}
            </div>
            <div class="item-eui">${node.eui || '--'}</div>
            <div class="item-stats">
              <div class="stat">RSSI: <span class="stat-value ${getSignalClass(node.rssi)}">${node.rssi?.toFixed(1) || '--'}</span></div>
              <div class="stat">SNR: <span class="stat-value">${node.snr?.toFixed(1) || '--'}</span></div>
              <div class="stat">TX: <span class="stat-value">${node.uplinks || 0}</span></div>
            </div>
          </div>
        `).join('');
        
        if (simulation.nodes.length > 20) {
          nodeList.innerHTML += `<div style="color: #64748b; font-size: 11px; padding: 8px;">+${simulation.nodes.length - 20} more...</div>`;
        }
      }
    }
    
    function getSignalClass(rssi) {
      if (rssi === undefined || rssi === null) return '';
      if (rssi < -120) return 'error';
      if (rssi < -100) return 'warning';
      return 'good';
    }
    
    // Canvas 渲染
    function worldToScreen(pos, scale = 0.12) {
      const cx = canvas.offsetWidth / 2;
      const cy = canvas.offsetHeight / 2;
      return {
        x: cx + (pos.x || 0) * scale,
        y: cy - (pos.y || 0) * scale
      };
    }
    
    function drawGrid() {
      const step = 500;
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      
      for (let x = -3000; x <= 3000; x += step) {
        const start = worldToScreen({ x, y: -3000 });
        const end = worldToScreen({ x, y: 3000 });
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
      }
      
      for (let y = -3000; y <= 3000; y += step) {
        const start = worldToScreen({ x: -3000, y });
        const end = worldToScreen({ x: 3000, y });
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
      }
    }
    
    function drawGateway(gw) {
      const pos = worldToScreen(gw.position);
      
      // 覆盖范围
      if (showCoverage) {
        ctx.beginPath();
        const radius = 2500 * 0.12;
        ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(59, 130, 246, 0.08)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.25)';
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      
      // 网关图标
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 12, 0, Math.PI * 2);
      ctx.fillStyle = '#3b82f6';
      ctx.fill();
      ctx.strokeStyle = '#60a5fa';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // 名称
      ctx.fillStyle = '#94a3b8';
      ctx.font = '11px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(gw.name || gw.eui?.slice(-8), pos.x, pos.y + 24);
    }
    
    function drawNode(node) {
      const pos = worldToScreen(node.position);
      const hasAnomaly = node.anomaly?.enabled;
      const color = hasAnomaly ? '#ef4444' : '#22c55e';
      
      // 节点图标
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      
      // 脉冲效果
      if (animationEnabled && node.joined) {
        const pulse = Math.sin(animationFrame * 0.05 + (node.position?.x || 0) * 0.01) * 0.3 + 0.7;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 6 + pulse * 4, 0, Math.PI * 2);
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.3 * pulse;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
    
    function render() {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
      
      drawGrid();
      
      // 绘制网关
      simulation.gateways.forEach(drawGateway);
      
      // 绘制节点
      simulation.nodes.forEach(drawNode);
      
      if (animationEnabled) {
        animationFrame++;
      }
      
      requestAnimationFrame(render);
    }
    
    // 控制函数
    function setView(mode) {
      viewMode = mode;
      document.getElementById('btn-top').classList.toggle('active', mode === 'top');
      document.getElementById('btn-side').classList.toggle('active', mode === 'side');
    }
    
    function toggleCoverage() {
      showCoverage = !showCoverage;
      document.getElementById('btn-coverage').classList.toggle('active');
    }
    
    function toggleAnimation() {
      animationEnabled = !animationEnabled;
      document.getElementById('btn-animation').classList.toggle('active');
    }
    
    // 启动
    init();
  </script>
</body>
</html>
